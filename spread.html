<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spread NTN-B — ImobData</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <div class="header-content">
      <div class="header-left">
        <a href="index.html" class="logo">ImobData</a>
        <nav class="header-nav">
          <a href="simulador.html" class="nav-link">Simulador de Carteira</a>
          <a href="fiis.html" class="nav-link">Fundos Imobiliários</a>
          <a href="setor.html" class="nav-link">Análise Setorial</a>
          <a href="valuation.html" class="nav-link ativo">Ferramentas de Valuation</a>
        </nav>
      </div>
      <div class="header-right">
        <span class="uso-interno">USO INTERNO</span>
        <button onclick="history.back()" class="btn-voltar">&#8592; Voltar</button>
      </div>
    </div>
  </header>

  <main>
    <div id="loading" class="loading">Carregando dados...</div>
    <div id="erro" class="erro" style="display:none"></div>

    <div id="conteudo" style="display:none">

      <div class="spread-layout">

        <!-- Controles -->
        <div class="spread-controles-card">
          <div class="spread-controles-header">

            <!-- Busca de FII (esquerda) -->
            <div class="spread-fii-busca-wrapper">
              <div class="spread-fii-busca-group">
                <input type="text" id="spread-fii-input" class="spread-fii-input"
                  placeholder='Buscar FII... Ex: "MXRF11"'
                  autocomplete="off"
                  oninput="filtrarFiiSugestoes()"
                  onkeydown="navegarSugestoes(event)" />
                <div id="spread-fii-sugestoes" class="spread-fii-sugestoes" style="display:none"></div>
              </div>
              <div id="spread-fii-tag" class="spread-fii-tag" style="display:none">
                <span id="spread-fii-tag-nome"></span>
                <button onclick="removerFii()" class="spread-fii-tag-remover">✕</button>
              </div>
            </div>

            <!-- Botões de duration (direita) -->
            <div class="spread-duration-btns">
              <button class="btn-duration" data-anos="3" onclick="selecionarDuration(3)">3 anos</button>
              <button class="btn-duration" data-anos="5" onclick="selecionarDuration(5)">5 anos</button>
              <button class="btn-duration" data-anos="8" onclick="selecionarDuration(8)">8 anos</button>
              <button class="btn-duration" data-anos="10" onclick="selecionarDuration(10)">10 anos</button>
            </div>

          </div>

          <div id="spread-atual-wrapper" style="display:none" class="spread-atual-grid">
            <div>
              <div class="spread-atual-label" id="spread-ntnb-label">NTN-B atual</div>
              <div class="spread-atual-valor" id="spread-atual-valor">—</div>
            </div>
            <div id="spread-fii-atual-bloco" style="display:none">
              <div class="spread-atual-label" id="spread-fii-dy-label">DY atual</div>
              <div class="spread-atual-valor spread-fii-cor" id="spread-fii-atual-valor">—</div>
            </div>
            <div id="spread-diferenca-bloco" style="display:none">
              <div class="spread-atual-label">Spread (DY − NTN-B)</div>
              <div class="spread-atual-valor" id="spread-diferenca-valor">—</div>
            </div>
          </div>
        </div>

        <!-- Gráfico -->
        <div class="spread-grafico-card" id="spread-grafico-card" style="display:none">
          <div class="spread-grafico-header">
            <h3 class="spread-grafico-titulo" id="spread-grafico-titulo">NTN-B — Duration X anos</h3>
            <div class="grafico-controles">
              <button onclick="filtrarPeriodoSpread('1A')" class="btn-periodo ativo" data-periodo="1A">1A</button>
              <button onclick="filtrarPeriodoSpread('3A')" class="btn-periodo" data-periodo="3A">3A</button>
              <button onclick="filtrarPeriodoSpread('5A')" class="btn-periodo" data-periodo="5A">5A</button>
              <button onclick="filtrarPeriodoSpread('MAX')" class="btn-periodo" data-periodo="MAX">MAX</button>
            </div>
          </div>
          <div class="spread-canvas-wrapper">
            <canvas id="grafico-spread"></canvas>
          </div>
        </div>

      </div>

    </div>
  </main>

  <script src="js/spread.js"></script>
</body>
</html>
