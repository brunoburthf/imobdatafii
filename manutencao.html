<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>ImobData — Em manutenção</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #0e1116;
      color: #e6e9ef;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
      padding: 48px 32px;
      background: #161b22;
      border: 1px solid #2a313a;
      border-radius: 16px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.4);
    }
    .marca {
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #aab1bd;
    }
    p + p { margin-top: 12px; }
    .icone {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: #1f2730;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icone">⚙️</div>
    <div class="marca">ImobData</div>
    <h1>Site em manutenção</h1>
    <p>Estamos atualizando os dados e ajustando inconsistências em algumas telas.</p>
    <p>Voltamos em breve. Obrigado pela paciência.</p>
  </div>
</body>
</html>
