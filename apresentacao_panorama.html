<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panorama Geral — Setores — ImobData</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --slide-navy: #00093C;
      --slide-laranja: #EF6300;
      --slide-azul: #1c6bbd;
      --slide-verde: #0e9f6e;
      --slide-roxo: #7c3aed;
    }
    body { background: #0a0e1f; overflow: hidden; }

    /* Palco que centraliza o slide e escala pra caber na viewport */
    .ap-stage {
      position: fixed; left: 0; right: 0; top: 56px; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Slide fixo 1280x720 (16:9) — escala via transform setada no JS.
       Fontes em px relativas a esse canvas -> export consistente. */
    .ap-slide {
      width: 1280px; height: 720px;
      background: #fff; position: absolute;
      transform-origin: center center;
      box-shadow: 0 12px 50px rgba(0,0,0,0.5);
      display: none; flex-direction: column;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .ap-slide.ativo { display: flex; }

    /* ── CAPA ── */
    .ap-capa {
      background: linear-gradient(135deg, #00093C 0%, #021a5e 100%);
      color: #fff; align-items: flex-start; justify-content: center;
      padding: 0 90px;
    }
    .ap-capa-logo {
      font-size: 30px; font-weight: 600; letter-spacing: .5px;
      color: #fff; opacity: .85; margin-bottom: 40px;
    }
    .ap-capa-titulo {
      font-size: 80px; font-weight: 800; line-height: 1.05;
      letter-spacing: -1px; margin: 0;
    }
    .ap-capa-titulo .laranja { color: var(--slide-laranja); }
    .ap-capa-sub {
      font-size: 30px; font-weight: 400; opacity: .8;
      margin-top: 24px; max-width: 820px; line-height: 1.4;
    }
    .ap-capa-rodape {
      position: absolute; bottom: 56px; left: 90px; right: 90px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 20px; opacity: .7;
      border-top: 1px solid rgba(255,255,255,.2); padding-top: 22px;
    }

    /* ── HEADER do slide de setor ── */
    .ap-shead {
      background: var(--slide-navy); color: #fff;
      padding: 28px 56px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .ap-shead-left { display: flex; align-items: baseline; gap: 18px; }
    .ap-shead-titulo { font-size: 46px; font-weight: 800; letter-spacing: -.5px; }
    .ap-shead-kicker {
      font-size: 18px; text-transform: uppercase; letter-spacing: .12em;
      color: var(--slide-laranja); font-weight: 700;
    }
    .ap-shead-badges { display: flex; gap: 14px; }
    .ap-badge {
      background: rgba(255,255,255,.12); border-radius: 10px;
      padding: 10px 18px; text-align: center;
    }
    .ap-badge-num { font-size: 26px; font-weight: 800; line-height: 1; }
    .ap-badge-lbl { font-size: 13px; opacity: .8; margin-top: 4px;
      text-transform: uppercase; letter-spacing: .06em; }

    /* ── CORPO ── */
    .ap-body { flex: 1; padding: 28px 56px 36px; display: flex;
      flex-direction: column; gap: 22px; min-height: 0; }

    /* KPIs */
    .ap-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .ap-kpi {
      border: 1px solid #e6e8ef; border-radius: 14px;
      padding: 18px 22px; position: relative; overflow: hidden;
      background: #fff;
    }
    .ap-kpi::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0;
      width: 6px; background: var(--cor, var(--slide-laranja)); }
    .ap-kpi-lbl { font-size: 15px; text-transform: uppercase; letter-spacing: .06em;
      color: #6b7a8d; font-weight: 700; }
    .ap-kpi-val { font-size: 44px; font-weight: 800; color: var(--slide-navy);
      line-height: 1.05; margin-top: 8px; letter-spacing: -1px; }
    .ap-kpi-sub { font-size: 14px; color: #6b7a8d; margin-top: 4px; }

    /* Linha de baixo: gráfico + tabela */
    .ap-lower { flex: 1; display: grid; grid-template-columns: 1.25fr 1fr;
      gap: 28px; min-height: 0; }
    .ap-chart-box { display: flex; flex-direction: column; min-height: 0; }
    .ap-chart-titulo { font-size: 18px; font-weight: 700; color: var(--slide-navy);
      margin-bottom: 8px; }
    .ap-chart-wrap { position: relative; flex: 1; min-height: 0; }

    .ap-fiis-box { display: flex; flex-direction: column; min-height: 0; }
    .ap-fiis-titulo { font-size: 18px; font-weight: 700; color: var(--slide-navy);
      margin-bottom: 8px; }
    .ap-fiis-tabela { width: 100%; border-collapse: collapse; font-size: 19px;
      font-variant-numeric: tabular-nums; }
    .ap-fiis-tabela th {
      font-size: 14px; text-transform: uppercase; letter-spacing: .05em;
      color: #6b7a8d; font-weight: 700; text-align: right; padding: 8px 10px;
      border-bottom: 2px solid #e6e8ef;
    }
    .ap-fiis-tabela th:first-child { text-align: left; }
    .ap-fiis-tabela td { padding: 9px 10px; text-align: right;
      border-bottom: 1px solid #f0f2f5; }
    .ap-fiis-tabela td:first-child { text-align: left; font-weight: 700;
      color: var(--slide-navy); }
    .ap-fiis-tabela tr:last-child td { border-bottom: none; }
    .ap-pos { color: var(--slide-verde); font-weight: 600; }
    .ap-neg { color: #dc2626; font-weight: 600; }

    /* ── Barra de navegação (fora do slide, não entra no export) ── */
    .ap-nav {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 14px; z-index: 50;
      background: rgba(0,9,60,.85); backdrop-filter: blur(6px);
      padding: 10px 16px; border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,.4);
    }
    .ap-nav button {
      background: rgba(255,255,255,.12); color: #fff; border: 0;
      width: 42px; height: 42px; border-radius: 10px; cursor: pointer;
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .ap-nav button:hover { background: rgba(255,255,255,.25); }
    .ap-nav button:disabled { opacity: .3; cursor: default; }
    .ap-nav-contador { color: #fff; font-size: 16px; font-weight: 600;
      min-width: 64px; text-align: center; font-variant-numeric: tabular-nums; }
    .ap-nav-sep { width: 1px; height: 28px; background: rgba(255,255,255,.2); }
    .ap-btn-export {
      background: var(--slide-laranja) !important; gap: 8px; width: auto !important;
      padding: 0 16px; font-size: 14px !important; font-weight: 600;
    }
    .ap-btn-export.ok { background: var(--slide-verde) !important; }

    #loading, #erro { color: #fff; text-align: center; margin-top: 40vh; }
  </style>
</head>
<body>

  <header>
    <div class="header-content">
      <div class="header-left">
        <a href="index.html" class="logo">ImobData</a>
        <nav class="header-nav">
          <a href="simulador.html" class="nav-link">Simulador de Carteira</a>
          <a href="fiis.html" class="nav-link">Fundos Imobiliários</a>
          <a href="infra.html" class="nav-link">Infraestrutura</a>
          <a href="agro.html" class="nav-link">FI-Agros</a>
          <a href="setor.html" class="nav-link">Análise Setorial</a>
          <a href="noticias.html" class="nav-link">Notícias</a>
          <a href="valuation.html" class="nav-link ativo">Interno</a>
        </nav>
      </div>
      <div class="header-right">
        <span class="uso-interno">USO INTERNO</span>
        <button onclick="history.back()" class="btn-voltar">&#8592; Voltar</button>
      </div>
    </div>
  </header>

  <main>
    <div id="loading">Carregando dados...</div>
    <div id="erro" style="display:none"></div>
    <div class="ap-stage" id="ap-stage" style="display:none"></div>

    <div class="ap-nav" id="ap-nav" style="display:none">
      <button id="ap-prev" title="Anterior (←)">&#8249;</button>
      <span class="ap-nav-contador" id="ap-contador">1 / 1</span>
      <button id="ap-next" title="Próximo (→)">&#8250;</button>
      <div class="ap-nav-sep"></div>
      <button class="ap-btn-export" id="ap-export" title="Copiar slide como imagem">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span id="ap-export-lbl">Copiar imagem</span>
      </button>
    </div>
  </main>

  <script src="js/apresentacao_panorama.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/local.js"></script>
  <script>guardValuation();</script>
</body>
</html>
